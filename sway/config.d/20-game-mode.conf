# Game passthrough mode — when active, sway swallows almost no key combos
# so games (esp. Wine games like WoW) get all their keybinds.
#
# Auto-toggle is handled by scripts/game-mode-watcher which subscribes to
# sway focus events and switches in/out of this mode based on window class.
#
# Manual fallback bindings:
#   $mod+Escape (in default)  → enter game mode
#   $mod+Escape (in game)     → exit game mode (panic escape)

mode "game" {
    # Panic escape — always works even if the watcher dies
    bindsym $mod+Escape mode "default"
}

bindsym $mod+Escape mode "game"

# Start the watcher (single-instance via flock — duplicate launches exit silently)
exec_always "$HOME/.config/sway/scripts/game-mode-watcher"
