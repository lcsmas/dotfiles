# Media / function keys (XF86 keysyms — generic, host-independent).
# On keyboards without a given key the binding simply never fires; if a
# helper tool (brightnessctl/wpctl/playerctl) is absent the exec is a no-op.
# --locked = keys keep working while swaylock is active.

# Screen brightness
bindsym --locked XF86MonBrightnessDown exec brightnessctl set 5%-
bindsym --locked XF86MonBrightnessUp exec brightnessctl set 5%+

# Search / launcher key
bindsym XF86Search exec $menu

# Keyboard backlight
bindsym --locked XF86KbdBrightnessDown exec brightnessctl -d kbd_backlight set 10%-
bindsym --locked XF86KbdBrightnessUp exec brightnessctl -d kbd_backlight set 10%+

# Media transport
bindsym --locked XF86AudioPrev exec playerctl previous
bindsym --locked XF86AudioPlay exec playerctl play-pause
bindsym --locked XF86AudioNext exec playerctl next

# Mute / volume
bindsym --locked XF86AudioMute exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindsym --locked XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindsym --locked XF86AudioRaiseVolume exec wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+

# Mic mute
bindsym --locked XF86AudioMicMute exec wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
